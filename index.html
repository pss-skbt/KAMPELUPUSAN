<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamera Pelupusan Pintar</title>
    
    <!-- Icon untuk Add to Home Screen -->
    <link rel="apple-touch-icon" sizes="120x120" href="icon120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icon167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon180.png">
    <link rel="icon" type="image/png" sizes="180x180" href="icon180.png">

    <!-- Memuatkan Tesseract.js daripada CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons untuk estetika UI -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-primary {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        
        .btn-primary:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Penambahbaikan untuk skrin sentuh */
        input, select, button {
            font-size: 16px !important; /* Elakkan auto-zoom pada iPhone */
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <!-- Main Container -->
    <div id="main-view" class="w-full max-w-2xl mx-auto py-6 md:py-10 px-4">
        <!-- Header Section -->
        <div class="text-center mb-6 md:mb-8">
            <div class="inline-flex items-center justify-center p-3 bg-blue-600 rounded-2xl shadow-lg mb-4 text-white">
                <i data-lucide="camera" class="w-7 h-7 md:w-8 md:h-8"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight px-2">KAMERA PELUPUSAN PINTAR</h1>
            <p class="text-slate-500 mt-2 font-medium text-sm md:text-base">Sistem Pengurusan Rekod & Pelupusan</p>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 overflow-hidden border border-slate-100 glass-effect">
            
            <!-- Camera Viewfinder Section -->
            <div class="relative bg-slate-900 aspect-[4/3] sm:aspect-video md:aspect-[4/3] flex items-center justify-center overflow-hidden">
                <video id="camera-preview" autoplay playsinline class="w-full h-full object-cover"></video>
                <canvas id="capture-canvas" class="hidden"></canvas>
                
                <!-- Overlay Grid for Focus -->
                <div id="camera-overlay" class="absolute inset-0 border-2 border-dashed border-white/20 m-6 md:m-12 pointer-events-none rounded-2xl hidden"></div>
                
                <!-- Placeholder when camera is off -->
                <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                    <div class="bg-slate-800/50 p-5 rounded-full mb-4">
                        <i data-lucide="image" class="w-10 h-10 opacity-40"></i>
                    </div>
                    <p class="text-sm font-medium text-slate-500">Sedia Untuk Imbasan</p>
                </div>
            </div>

            <div class="p-5 md:p-8">
                <!-- Control Buttons Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                    <button id="btn-start-camera" class="btn-primary flex items-center justify-center space-x-2 bg-slate-900 text-white py-4 px-6 rounded-2xl font-bold hover:bg-slate-800 shadow-lg transition-all w-full">
                        <i data-lucide="video" class="w-5 h-5"></i>
                        <span>Buka Kamera</span>
                    </button>
                    
                    <button id="btn-snap" class="btn-primary flex items-center justify-center space-x-2 bg-blue-600 text-white py-4 px-6 rounded-2xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-200 hidden w-full">
                        <i data-lucide="aperture" class="w-5 h-5"></i>
                        <span>Ambil Gambar</span>
                    </button>

                    <label for="gambar-input" class="btn-primary cursor-pointer flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-4 px-6 rounded-2xl font-bold hover:bg-slate-200 w-full">
                        <i data-lucide="upload" class="w-5 h-5"></i>
                        <span>Muat Naik Fail</span>
                    </label>
                    <input type="file" id="gambar-input" accept="image/*" class="hidden">
                </div>

                <!-- Processing Status Card -->
                <div id="status-container" class="mb-8 p-4 bg-blue-50 border border-blue-100 rounded-2xl flex items-center justify-between hidden animate-pulse">
                    <div class="flex items-center space-x-3">
                        <div class="loader" id="loading-spinner"></div>
                        <span id="status-text" class="text-sm font-bold text-blue-700 uppercase tracking-wide">Mengecam teks...</span>
                    </div>
                </div>

                <!-- Form Fields Container -->
                <div class="space-y-6">
                    <!-- Tajuk Rekod -->
                    <div class="group">
                        <label for="input-tajuk" class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                            <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                            <span>TAJUK REKOD / BAHAN</span>
                        </label>
                        <input type="text" id="input-tajuk" 
                               placeholder="Hasil imbasan akan muncul di sini..."
                               class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold placeholder:text-slate-300 focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50/50 outline-none transition-all uppercase text-lg">
                    </div>

                    <!-- Tahun & Meter Row (Responsive Grid) -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="group">
                            <label for="input-tahun" class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                                <i data-lucide="calendar" class="w-4 h-4 text-blue-600"></i>
                                <span>TAHUN</span>
                            </label>
                            <input type="number" id="input-tahun" placeholder="Cth: 2024"
                                   class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50/50 outline-none transition-all text-lg">
                        </div>
                        <div class="group">
                            <label for="input-meter" class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                                <i data-lucide="gauge" class="w-4 h-4 text-blue-600"></i>
                                <span>METER / JUMLAH</span>
                            </label>
                            <input type="text" id="input-meter" placeholder="Cth: 10m/p"
                                   class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50/50 outline-none transition-all text-lg">
                        </div>
                    </div>

                    <!-- Cadangan Dropdown -->
                    <div class="group">
                        <label for="select-cadangan" class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 ml-1 uppercase tracking-widest">
                            <i data-lucide="check-circle" class="w-4 h-4 text-blue-600"></i>
                            <span>CADANGAN TINDAKAN</span>
                        </label>
                        <div class="relative">
                            <select id="select-cadangan" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl text-slate-800 font-bold focus:border-blue-500 focus:bg-white focus:ring-4 focus:ring-blue-50/50 outline-none transition-all appearance-none cursor-pointer text-lg">
                                <option value="">Sila Pilih Tindakan</option>
                                <option value="MUSNAH">MUSNAH</option>
                                <option value="KITAR SEMULA">KITAR SEMULA</option>
                                <option value="DERMA">DERMA</option>
                            </select>
                            <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                <i data-lucide="chevron-down" class="w-5 h-5"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Main Action Buttons -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-6">
                        <button onclick="resetForm()" class="btn-primary flex items-center justify-center space-x-2 bg-rose-50 text-rose-600 py-5 px-4 rounded-2xl font-black hover:bg-rose-100 transition-colors uppercase tracking-tight">
                            <i data-lucide="refresh-ccw" class="w-5 h-5"></i>
                            <span>Mula Semula</span>
                        </button>
                        <button onclick="copyAllData()" class="btn-primary flex items-center justify-center space-x-2 bg-slate-100 text-slate-700 py-5 px-4 rounded-2xl font-black hover:bg-slate-200 transition-colors uppercase tracking-tight">
                            <i data-lucide="clipboard" class="w-5 h-5"></i>
                            <span>Salin Teks</span>
                        </button>
                    </div>

                    <!-- New Button ARKIB 2 -->
                    <button onclick="openArkib2()" class="btn-primary flex items-center justify-center space-x-2 bg-indigo-600 text-white py-5 px-4 rounded-2xl font-black hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all uppercase tracking-tight w-full">
                        <i data-lucide="archive" class="w-5 h-5"></i>
                        <span>ARKIB 2</span>
                    </button>

                    <button id="btn-save" onclick="saveToSheets()" class="btn-primary flex items-center justify-center space-x-2 bg-emerald-600 text-white py-5 px-4 rounded-2xl font-black hover:bg-emerald-700 shadow-xl shadow-emerald-100 transition-all uppercase tracking-tight w-full">
                        <i data-lucide="send" class="w-5 h-5"></i>
                        <span>Simpan Rekod</span>
                    </button>
                </div>
            </div>
        </div>

        <p class="text-center text-slate-400 text-[10px] md:text-xs mt-10 uppercase tracking-[0.2em] font-black opacity-50">
            Smart Inventory Systems &bull; v2.0
        </p>
    </div>

    <!-- ARKIB 2 VIEW (Pemusnahan Rekod Awam) -->
    <div id="arkib2-view" class="hidden w-full max-w-2xl mx-auto py-6 md:py-10 px-4 animate-in fade-in slide-in-from-bottom-4 duration-300">
        <button onclick="closeArkib2()" class="mb-6 flex items-center text-slate-500 font-bold hover:text-slate-800 transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i>
            KEMBALI
        </button>

        <div class="text-center mb-8">
            <h1 class="text-xl md:text-2xl font-extrabold tracking-tight">BORANG PERMOHONAN BAGI PEMUSNAHAN REKOD AWAM</h1>
            <p class="text-slate-500 mt-2 font-medium text-xs uppercase tracking-widest">Maklumat Mengenai Rekod (Arkib 2)</p>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/60 p-6 md:p-8 border border-slate-100">
            
            <!-- Camera Section for Arkib 2 -->
            <div id="arkib-camera-section" class="mb-8 rounded-2xl overflow-hidden bg-slate-900 relative aspect-video flex items-center justify-center">
                 <video id="arkib-video" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                 <div id="arkib-camera-placeholder" class="text-slate-500 flex flex-col items-center">
                    <i data-lucide="camera-off" class="w-10 h-10 mb-2 opacity-30"></i>
                    <p class="text-xs font-bold uppercase">Kamera Ditutup</p>
                 </div>
                 <button id="btn-arkib-snap" class="absolute bottom-4 right-4 bg-blue-600 text-white p-4 rounded-full shadow-lg hidden">
                    <i data-lucide="aperture" class="w-6 h-6"></i>
                 </button>
            </div>

            <div class="space-y-6">
                <!-- Start Camera for Arkib 2 -->
                <button id="btn-arkib-camera" class="btn-primary w-full flex items-center justify-center space-x-2 bg-slate-900 text-white py-4 rounded-2xl font-bold">
                    <i data-lucide="camera" class="w-5 h-5"></i>
                    <span>AMBIL GAMBAR REKOD</span>
                </button>

                <!-- Bilangan (Auto/Manual) -->
                <div class="group">
                    <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                        <span>BIL. (5)</span>
                    </label>
                    <input type="number" id="arkib-bil" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all">
                </div>

                <!-- Tajuk Siri (6) -->
                <div class="group">
                    <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                        <span>TAJUK SIRI (6)</span>
                    </label>
                    <textarea id="arkib-tajuk-siri" rows="2" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all uppercase" placeholder="Cth: REKOD KEWANGAN..."></textarea>
                </div>

                <!-- Tahun Diliputi (7) -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="group">
                        <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                            <span>TAHUN (DARIPADA)</span>
                        </label>
                        <input type="number" id="arkib-tahun-dari" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Cth: 2010">
                    </div>
                    <div class="group">
                        <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                            <span>TAHUN (KEPADA)</span>
                        </label>
                        <input type="number" id="arkib-tahun-ke" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Cth: 2020">
                    </div>
                </div>

                <!-- Tempoh Pengekalan (8) -->
                <div class="group">
                    <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                        <span>TEMPOH PENGEKALAN (8)</span>
                    </label>
                    <input type="text" id="arkib-tempoh" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Cth: 7 TAHUN">
                </div>

                <!-- Unit Rekod (9) & Meter Panjang (10) -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="group">
                        <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                            <span>UNIT REKOD (9)</span>
                        </label>
                        <input type="text" id="arkib-unit" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Cth: FAIL / KOTAK">
                    </div>
                    <div class="group">
                        <label class="flex items-center space-x-2 text-xs font-black text-slate-500 mb-2 uppercase tracking-widest">
                            <span>METER PANJANG (10)</span>
                        </label>
                        <input type="text" id="arkib-meter" class="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" placeholder="Cth: 0.5 M">
                    </div>
                </div>

                <!-- Arkib 2 Save Button -->
                <button onclick="saveArkib2()" class="btn-primary w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-all uppercase">
                    SIMPAN REKOD ARKIB 2
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // GANTIKAN URL INI DENGAN URL WEB APP DARI GOOGLE APPS SCRIPT ANDA
        const scriptURL = 'SILA_MASUKKAN_URL_SCRIPT_DI_SINI';

        // Elements for Main View
        const mainView = document.getElementById('main-view');
        const arkib2View = document.getElementById('arkib2-view');
        const video = document.getElementById('camera-preview');
        const canvas = document.getElementById('capture-canvas');
        const btnStart = document.getElementById('btn-start-camera');
        const btnSnap = document.getElementById('btn-snap');
        const cameraPlaceholder = document.getElementById('camera-placeholder');
        const cameraOverlay = document.getElementById('camera-overlay');
        
        const inputGambar = document.getElementById('gambar-input');
        const inputTajuk = document.getElementById('input-tajuk');
        const inputTahun = document.getElementById('input-tahun');
        const inputMeter = document.getElementById('input-meter');
        const selectCadangan = document.getElementById('select-cadangan');
        
        const statusContainer = document.getElementById('status-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const statusText = document.getElementById('status-text');

        let stream = null;
        let arkibStream = null;

        // --- CAMERA LOGIC MAIN ---
        btnStart.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                btnStart.classList.add('hidden');
                btnSnap.classList.remove('hidden');
                cameraPlaceholder.classList.add('hidden');
                cameraOverlay.classList.remove('hidden');
            } catch (err) {
                console.error("Ralat akses kamera: ", err);
                alert("Akses kamera dinafikan atau tidak dijumpai.");
            }
        });

        btnSnap.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');
            prosesOCR(dataUrl);
            stopCamera();
        });

        function stopCamera() {
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            btnStart.classList.remove('hidden');
            btnSnap.classList.add('hidden');
            cameraPlaceholder.classList.remove('hidden');
            cameraOverlay.classList.add('hidden');
            video.srcObject = null;
        }

        // --- NAVIGATION ARKIB 2 ---
        function openArkib2() {
            stopCamera();
            mainView.classList.add('hidden');
            arkib2View.classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function closeArkib2() {
            stopArkibCamera();
            arkib2View.classList.add('hidden');
            mainView.classList.remove('hidden');
        }

        // --- ARKIB 2 CAMERA LOGIC ---
        const arkibVideo = document.getElementById('arkib-video');
        const btnArkibCamera = document.getElementById('btn-arkib-camera');
        const btnArkibSnap = document.getElementById('btn-arkib-snap');
        const arkibPlaceholder = document.getElementById('arkib-camera-placeholder');

        btnArkibCamera.addEventListener('click', async () => {
            try {
                arkibStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                arkibVideo.srcObject = arkibStream;
                arkibVideo.classList.remove('hidden');
                btnArkibSnap.classList.remove('hidden');
                arkibPlaceholder.classList.add('hidden');
                btnArkibCamera.classList.add('opacity-50', 'pointer-events-none');
            } catch (err) {
                alert("Gagal membuka kamera Arkib.");
            }
        });

        btnArkibSnap.addEventListener('click', () => {
            canvas.width = arkibVideo.videoWidth;
            canvas.height = arkibVideo.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(arkibVideo, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL('image/jpeg');
            
            // Proses OCR khusus untuk Arkib 2
            prosesOCRArkib(dataUrl);
            stopArkibCamera();
        });

        function stopArkibCamera() {
            if(arkibStream) {
                arkibStream.getTracks().forEach(track => track.stop());
                arkibStream = null;
            }
            arkibVideo.classList.add('hidden');
            btnArkibSnap.classList.add('hidden');
            arkibPlaceholder.classList.remove('hidden');
            btnArkibCamera.classList.remove('opacity-50', 'pointer-events-none');
        }

        // --- OCR PROCESSING ---
        inputGambar.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) prosesOCR(file);
        });

        function prosesOCR(source) {
            statusContainer.classList.remove('hidden');
            statusText.innerText = "Mengecam teks...";
            
            Tesseract.recognize(source, 'msa+eng', { 
                logger: m => { if(m.status === 'recognizing text') statusText.innerText = `Memproses: ${Math.round(m.progress * 100)}%`; } 
            }).then(({ data: { text } }) => {
                const meterMatch = text.match(/\d+(\s?)(m\/p|meter|unit|kg|keping|buah|m)\b/i);
                if (meterMatch) inputMeter.value = meterMatch[0].toUpperCase();

                let cleanText = text.replace(/[^a-zA-Z0-9\s\/]/g, '').replace(/\n/g, ' ').replace(/\s\s+/g, ' ').trim().toUpperCase();
                inputTajuk.value = cleanText;
                
                statusText.innerText = "Imbasan berjaya!";
                setTimeout(() => statusContainer.classList.add('hidden'), 3000);
            }).catch(() => {
                statusText.innerText = "Ralat imbasan.";
            });
        }

        function prosesOCRArkib(source) {
            // Logik ringkas untuk Arkib 2
            statusContainer.classList.remove('hidden');
            statusText.innerText = "Mengecam maklumat Arkib...";

            Tesseract.recognize(source, 'msa+eng').then(({ data: { text } }) => {
                // Cuba cari tahun (Cth: 2010 - 2020)
                const years = text.match(/\b(19|20)\d{2}\b/g);
                if(years && years.length >= 2) {
                    document.getElementById('arkib-tahun-dari').value = years[0];
                    document.getElementById('arkib-tahun-ke').value = years[1];
                } else if(years && years.length === 1) {
                    document.getElementById('arkib-tahun-dari').value = years[0];
                }

                document.getElementById('arkib-tajuk-siri').value = text.substring(0, 100).replace(/\n/g, ' ').trim().toUpperCase();
                statusText.innerText = "Data Arkib 2 dikemaskini!";
                setTimeout(() => statusContainer.classList.add('hidden'), 3000);
            });
        }

        // --- DATA MANAGEMENT ---
        function resetForm() {
            inputTajuk.value = ""; inputTahun.value = ""; inputMeter.value = ""; selectCadangan.value = "";
            statusContainer.classList.add('hidden');
        }

        function copyAllData() {
            const formatData = `TAJUK: ${inputTajuk.value}\nTAHUN: ${inputTahun.value}\nMETER/JUMLAH: ${inputMeter.value}\nCADANGAN: ${selectCadangan.value}`;
            navigator.clipboard.writeText(formatData).then(() => {
                statusContainer.classList.remove('hidden');
                statusText.innerText = "Disalin ke papan klip!";
                setTimeout(() => statusContainer.classList.add('hidden'), 2000);
            });
        }

        async function saveToSheets() {
            if (!inputTajuk.value) return alert("Sila imbas atau isi tajuk.");
            const btnSave = document.getElementById('btn-save');
            btnSave.disabled = true; btnSave.innerText = "Menyimpan...";
            
            const formData = new FormData();
            formData.append('TARIKH', new Date().toLocaleDateString('ms-MY'));
            formData.append('TAJUK_REKOD_BAHAN', inputTajuk.value);
            formData.append('TAHUN', inputTahun.value);
            formData.append('METER_JUMLAH', inputMeter.value);
            formData.append('CADANGAN_TINDAKAN', selectCadangan.value);

            try {
                if(scriptURL !== 'SILA_MASUKKAN_URL_SCRIPT_DI_SINI') {
                    await fetch(scriptURL, { method: 'POST', body: formData });
                }
                alert("Rekod berjaya disimpan!");
                resetForm();
            } catch (e) {
                alert("Gagal menyimpan. Sila semak URL Script.");
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = `<i data-lucide="send" class="w-5 h-5"></i><span>Simpan Rekod</span>`;
                lucide.createIcons();
            }
        }

        function saveArkib2() {
            const data = {
                bil: document.getElementById('arkib-bil').value,
                tajuk: document.getElementById('arkib-tajuk-siri').value,
                dari: document.getElementById('arkib-tahun-dari').value,
                ke: document.getElementById('arkib-tahun-ke').value,
                tempoh: document.getElementById('arkib-tempoh').value,
                unit: document.getElementById('arkib-unit').value,
                meter: document.getElementById('arkib-meter').value
            };
            
            console.log("Menyimpan Data Arkib 2:", data);
            alert("Data Arkib 2 telah diproses secara simulasi. Sila hubungkan ke API Google Sheets untuk simpanan kekal.");
            closeArkib2();
        }
    </script>
