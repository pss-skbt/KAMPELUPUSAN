<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekstrak Teks ke Tajuk</title>
    <!-- Memuatkan Tesseract.js daripada CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Mirror view untuk keselesaan pengguna semasa membidik */
        .mirror {
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4 text-gray-800 text-center">Aplikasi OCR Pintar</h1>
        
        <!-- Bahagian Kamera -->
        <div class="mb-4">
            <div class="relative bg-black rounded-lg overflow-hidden aspect-video mb-2">
                <!-- Tambah class mirror secara dinamik -->
                <video id="camera-preview" autoplay playsinline class="w-full h-full object-cover mirror"></video>
                <canvas id="capture-canvas" class="hidden"></canvas>
            </div>
            <div class="flex space-x-2">
                <button id="btn-start-camera" class="flex-1 bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition">Buka Kamera</button>
                <button id="btn-snap" class="flex-1 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition hidden">Ambil Gambar</button>
            </div>
        </div>

        <div class="flex items-center my-4">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="px-3 text-gray-500 text-sm">ATAU</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <!-- Bahagian Input Fail -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Muat Naik Gambar</label>
            <input type="file" id="gambar-input" accept="image/*" 
                   class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
        </div>

        <!-- Indikator Loading -->
        <div id="status-container" class="flex items-center space-x-3 mb-4 hidden">
            <div class="loader" id="loading-spinner"></div>
            <p id="status-text" class="text-sm text-blue-600 font-medium">Sedia...</p>
        </div>

        <hr class="my-6">

        <!-- Bahagian Tajuk yang Akan Diisi Otomatis -->
        <div class="mb-4">
            <label for="input-tajuk" class="block text-sm font-medium text-gray-700 mb-1">Tajuk Teks Terkesan</label>
            <input type="text" id="input-tajuk" placeholder="Hasil OCR akan muncul di sini..."
                   class="w-full p-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none transition-all">
        </div>

        <p class="text-xs text-gray-500 italic text-center">Nota: Gambar akan diperbetulkan secara automatik sebelum diproses.</p>
    </div>

    <script>
        const video = document.getElementById('camera-preview');
        const canvas = document.getElementById('capture-canvas');
        const btnStart = document.getElementById('btn-start-camera');
        const btnSnap = document.getElementById('btn-snap');
        
        const inputGambar = document.getElementById('gambar-input');
        const inputTajuk = document.getElementById('input-tajuk');
        const statusContainer = document.getElementById('status-container');
        const loadingSpinner = document.getElementById('loading-spinner');
        const statusText = document.getElementById('status-text');

        let stream = null;
        let isFrontCamera = true;

        // Fungsi Membuka Kamera
        btnStart.addEventListener('click', async () => {
            try {
                // Cuba akses kamera hadapan secara default
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = stream;
                btnStart.classList.add('hidden');
                btnSnap.classList.remove('hidden');
                video.classList.add('mirror'); // Mirroring untuk kamera hadapan
                isFrontCamera = true;
            } catch (err) {
                console.error("Ralat akses kamera: ", err);
                alert("Tidak dapat mengakses kamera.");
            }
        });

        // Fungsi Mengambil Gambar (Snap)
        btnSnap.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            
            // Logik membetulkan imej jika kamera hadapan (mirrored) digunakan
            if (isFrontCamera) {
                ctx.translate(canvas.width, 0);
                ctx.scale(-1, 1);
            }
            
            // Lukis frame video ke canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Tukar canvas ke DataURL
            const dataUrl = canvas.toDataURL('image/jpeg');
            prosesOCR(dataUrl);
            
            // Tutup kamera
            if(stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            btnStart.classList.remove('hidden');
            btnSnap.classList.add('hidden');
            video.srcObject = null;
        });

        // Mendengar perubahan pada input fail
        inputGambar.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            prosesOCR(file);
        });

        // Fungsi Utama OCR
        function prosesOCR(source) {
            statusContainer.classList.remove('hidden');
            loadingSpinner.style.display = 'block';
            statusText.classList.replace('text-green-600', 'text-blue-600');
            statusText.classList.replace('text-red-600', 'text-blue-600');
            inputTajuk.value = "Sedang memproses...";

            Tesseract.recognize(
                source,
                'msa+eng',
                { 
                    logger: m => {
                        if(m.status === 'recognizing text') {
                            statusText.innerText = `Mengecam: ${Math.round(m.progress * 100)}%`;
                        }
                    } 
                }
            ).then(({ data: { text } }) => {
                const cleanText = text.trim().replace(/\n/g, ' ');
                inputTajuk.value = cleanText || "Tiada teks dikesan";
                loadingSpinner.style.display = 'none';
                statusText.innerText = "Selesai!";
                statusText.classList.replace('text-blue-600', 'text-green-600');
            }).catch(err => {
                console.error(err);
                inputTajuk.value = "";
                statusText.innerText = "Ralat OCR.";
                statusText.classList.replace('text-blue-600', 'text-red-600');
            });
        }
    </script>
</body>
</html>
